services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: multistream
      POSTGRES_PASSWORD: password
      POSTGRES_DB: multistream
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U multistream"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  srs:
    image: ossrs/srs:5
    command: ./objs/srs -c /usr/local/srs/conf/rtc.conf
    ports:
      - "1935:1935"    # RTMP ingest — point OBS here
      - "1985:1985"    # SRS HTTP API
      - "8080:8080"    # HLS playback
    volumes:
      - ./docker/srs.conf:/usr/local/srs/conf/rtc.conf
    extra_hosts:
      - "host.docker.internal:host-gateway"  # lets SRS reach your local API

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"   # S3-compatible API
      - "9001:9001"   # Web console → http://localhost:9001
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  minio_data:

# SRS Configuration for RTMP Ingestion
listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        console;

http_server {
    enabled         on;
    listen          8080;
}

http_api {
    enabled         on;
    listen          1985;
}

vhost __defaultVhost__ {
    # HTTP Callback for stream events
    on_publish      http://api:3001/api/webhooks/rtmp/on-publish;
    on_unpublish    http://api:3001/api/webhooks/rtmp/on-unpublish;
    on_connect      http://api:3001/api/webhooks/rtmp/on-connect;
    on_close        http://api:3001/api/webhooks/rtmp/on-close;
    
    # HLS for playback
    hls {
        enabled     on;
        hls_path    ./objs/nginx/html;
        hls_fragment 10;
        hls_window  60;
    }
    
    # RTMP to HLS conversion
    transcode rt2hls {
        enabled     on;
        ffmpeg      ./objs/ffmpeg/bin/ffmpeg;
        engine rt2hls {
            enabled     on;
            iformat     flv;
            vcodec      copy;
            acodec      aac;
            oformat     hls;
            output      ./objs/nginx/html/[app]/[stream].m3u8;
        }
    }
}
